<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 — 익명 메시지</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg:     #ffffff;
    --bg2:    #f5f5f7;
    --bg3:    #ebebeb;
    --text:   #1c1c1e;
    --text2:  #6e6e73;
    --blue:   #007aff;
    --border: #d1d1d6;
    --red:    #ff3b30;
    --green:  #34c759;
    --radius: 14px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }

  /* ── LOGIN ── */
  #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
  .login-box { width: 100%; max-width: 360px; padding: 40px 28px; display: flex; flex-direction: column; gap: 18px; align-items: center; }
  .login-box h1 { font-size: 22px; font-weight: 700; }
  .login-box p { font-size: 14px; color: var(--text2); text-align: center; }
  .login-box input { width: 100%; height: 50px; border-radius: 14px; border: 1.5px solid var(--border); padding: 0 16px; font-size: 16px; outline: none; }
  .login-box input:focus { border-color: var(--blue); }
  .login-box .l-btn { width: 100%; height: 50px; border-radius: 14px; border: none; background: var(--blue); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; }
  .login-box .l-btn:hover { opacity: .9; }
  .login-err { color: var(--red); font-size: 13px; display: none; }

  /* ── ADMIN UI ── */
  #admin-ui { display: none; flex-direction: column; min-height: 100vh; }
  header { background: var(--bg); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 20px; font-weight: 700; }
  header .h-right { display: flex; align-items: center; gap: 14px; }
  header .h-right span { font-size: 13px; color: var(--text2); }
  .logout-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; color: var(--text); }
  .logout-btn:hover { background: var(--bg2); }
  .main { max-width: 1000px; margin: 0 auto; padding: 24px 20px; }

  /* ── STATS ── */
  .stats-row { display: flex; gap: 14px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat { background: var(--bg); border-radius: var(--radius); padding: 14px 20px; flex: 1; min-width: 120px; border: 1px solid var(--border); }
  .stat .s-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .stat .s-val { font-size: 26px; font-weight: 700; }
  .stat.blue .s-val { color: var(--blue); }
  .stat.green .s-val { color: var(--green); }
  .stat.red .s-val { color: var(--red); }

  /* ── ROOMS TABLE ── */
  .section-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; font-size: 12px; }
  .rooms-wrap { background: var(--bg); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 12px; color: var(--text2); font-weight: 600; padding: 10px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #fafafa; }

  /* badge */
  .badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
  .badge.active  { background: #dcfce7; color: #166534; }
  .badge.expired { background: #fee2e2; color: #991b1b; }
  .badge.ext     { background: #dbeafe; color: #1e40af; margin-left: 5px; }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; }
  .badge.active .badge-dot  { background: #16a34a; }
  .badge.expired .badge-dot { background: #dc2626; }

  /* action btns */
  .acts { display: flex; gap: 6px; flex-wrap: wrap; }
  .a-btn { background: none; border: 1px solid var(--border); border-radius: 7px; padding: 5px 11px; font-size: 12px; cursor: pointer; color: var(--text); white-space: nowrap; transition: all .12s; }
  .a-btn:hover { background: var(--bg2); }
  .a-btn.view { border-color: var(--blue); color: var(--blue); }
  .a-btn.view:hover { background: #eef5ff; }
  .a-btn.ext-btn { border-color: #6366f1; color: #6366f1; }
  .a-btn.ext-btn:hover { background: #eef2ff; }
  .a-btn.del { border-color: #fca5a5; color: var(--red); }
  .a-btn.del:hover { background: #fff5f5; }

  /* room code pill */
  .room-code { font-family: 'SF Mono', 'Menlo', monospace; font-size: 15px; font-weight: 700; letter-spacing: 2px; background: var(--bg2); padding: 3px 10px; border-radius: 8px; }
  .empty { text-align: center; padding: 60px 20px; color: var(--text2); font-size: 15px; }

  /* ── DETAIL PANEL ── */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none; align-items: flex-end; justify-content: center; z-index: 100; }
  .overlay.open { display: flex; }
  @media (min-width: 600px) { .overlay { align-items: center; } }
  .panel { background: var(--bg); border-radius: 20px 20px 0 0; width: 100%; max-height: 85vh; display: flex; flex-direction: column; }
  @media (min-width: 600px) { .panel { max-width: 520px; border-radius: 20px; max-height: 80vh; } }
  .panel-head { padding: 18px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .panel-head h3 { font-size: 17px; font-weight: 700; }
  .panel-close { background: var(--bg2); border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text2); }
  .panel-msgs { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; }
  .p-msg { display: flex; flex-direction: column; }
  .p-msg.out { align-items: flex-end; }
  .p-msg.in  { align-items: flex-start; }
  .p-bub { padding: 9px 14px; border-radius: 16px; font-size: 15px; line-height: 1.45; max-width: 75%; word-break: break-word; }
  .p-msg.out .p-bub { background: #007aff; color: #fff; border-bottom-right-radius: 4px; }
  .p-msg.in  .p-bub { background: #e9e9eb; color: var(--text); border-bottom-left-radius: 4px; }
  .p-time { font-size: 11px; color: var(--text2); margin-top: 3px; }
  .p-sep { text-align: center; font-size: 11px; color: var(--text2); margin: 6px 0; }
  .panel-empty { color: var(--text2); font-size: 14px; text-align: center; padding: 40px; }

  /* ── CONFIRM MODAL ── */
  .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none; align-items: center; justify-content: center; z-index: 200; }
  .confirm-overlay.open { display: flex; }
  .confirm-box { background: var(--bg); border-radius: 18px; padding: 28px 24px; width: 90%; max-width: 340px; }
  .confirm-box h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .confirm-box p  { font-size: 14px; color: var(--text2); line-height: 1.55; margin-bottom: 22px; }
  .confirm-btns { display: flex; gap: 10px; }
  .confirm-btns button { flex: 1; height: 46px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; }
  .c-cancel { background: var(--bg3); color: var(--text); }
  .c-ok     { background: var(--blue); color: #fff; }
  .c-del    { background: var(--red);  color: #fff; }

  /* ── TOAST & SPINNER ── */
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(14px); background: rgba(28,28,30,.9); color: #fff; font-size: 14px; padding: 10px 22px; border-radius: 22px; z-index: 300; opacity: 0; transition: all .25s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div style="font-size:36px">🔒</div>
    <h1>관리자 로그인</h1>
    <p>익명 메시지 관리자 전용 페이지입니다.</p>
    <input type="password" id="pw-input" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()" />
    <div class="login-err" id="login-err">비밀번호가 올바르지 않습니다.</div>
    <button class="l-btn" onclick="doLogin()">로그인</button>
  </div>
</div>

<div id="admin-ui">
  <header>
    <h1>관리자 대시보드</h1>
    <div class="h-right">
      <span id="last-refresh"></span>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>
  </header>
  <div class="main">
    <div class="stats-row" id="stats-row">
      <div class="stat blue"><div class="s-label">전체 채팅방</div><div class="s-val" id="st-total">—</div></div>
      <div class="stat green"><div class="s-label">활성</div><div class="s-val" id="st-active">—</div></div>
      <div class="stat red"><div class="s-label">만료</div><div class="s-val" id="st-expired">—</div></div>
      <div class="stat"><div class="s-label">총 메시지</div><div class="s-val" id="st-msgs">—</div></div>
    </div>
    <div class="section-title">채팅방 목록</div>
    <div class="rooms-wrap" id="rooms-wrap">
      <div class="empty"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<div class="overlay" id="detail-overlay">
  <div class="panel">
    <div class="panel-head">
      <h3 id="detail-title">대화 내용</h3>
      <button class="panel-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="panel-msgs" id="detail-msgs"></div>
  </div>
</div>

<div class="confirm-overlay" id="del-overlay">
  <div class="confirm-box">
    <h3>채팅방 삭제</h3>
    <p id="del-msg">이 채팅방을 삭제하면 모든 대화 내용이 영구 삭제됩니다.</p>
    <div class="confirm-btns">
      <button class="c-cancel" onclick="closeConfirm('del-overlay')">취소</button>
      <button class="c-del"    onclick="confirmDelete()">삭제</button>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="ext-overlay">
  <div class="confirm-box">
    <h3>타이머 연장</h3>
    <p id="ext-msg">이 채팅방의 타이머를 15분 연장합니다.</p>
    <div class="confirm-btns">
      <button class="c-cancel" onclick="closeConfirm('ext-overlay')">취소</button>
      <button class="c-ok"     onclick="confirmExtend()">연장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 1. 파이어베이스 초기화 (가장 먼저 실행되어야 함) ──
const firebaseConfig = {
  apiKey: "AIzaSyALmi9bFPlxlv8h8YT3RDviVswF8qJLhMo",
  authDomain: "test-b933c.firebaseapp.com",
  databaseURL: "https://test-b933c-default-rtdb.firebaseio.com",
  projectId: "test-b933c",
  storageBucket: "test-b933c.firebasestorage.app",
  messagingSenderId: "982341907625",
  appId: "1:982341907625:web:4c90213e6ebb9d7ac465b8"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const db = firebase.database();

// ── 2. 관리자 설정 ──
const ADMIN_PW   = '1234';
const TIMER_MS   = 15 * 60 * 1000;

let roomsCache = {};
let deleteTarget = null;
let extendTarget = null;
let dbListener  = null;

// ── 3. 로그인 및 로그아웃 ──
function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw !== ADMIN_PW) {
    document.getElementById('login-err').style.display = 'block';
    return;
  }
  document.getElementById('login-err').style.display = 'none';
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-ui').style.display = 'flex';
  startListen();
}

function logout() {
  if (dbListener) { db.ref('rooms').off('value', dbListener); dbListener = null; }
  document.getElementById('admin-ui').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pw-input').value = '';
}

// ── 4. 실시간 데이터 수신 및 화면 그리기 ──
function startListen() {
  dbListener = db.ref('rooms').on('value', snap => {
    roomsCache = {};
    if (snap.exists()) snap.forEach(c => { roomsCache[c.key] = c.val(); });
    renderAll();
    updateRefreshTime();
  });
}

function renderAll() {
  const ids   = Object.keys(roomsCache);
  const now   = Date.now();
  const active   = ids.filter(id => (roomsCache[id].expiresAt || 0) > now);
  const expired  = ids.filter(id => (roomsCache[id].expiresAt || 0) <= now);
  const totalMsg = ids.reduce((s, id) => s + Object.keys(roomsCache[id].messages || {}).length, 0);

  document.getElementById('st-total').textContent   = ids.length;
  document.getElementById('st-active').textContent  = active.length;
  document.getElementById('st-expired').textContent = expired.length;
  document.getElementById('st-msgs').textContent    = totalMsg;

  const wrap = document.getElementById('rooms-wrap');
  if (ids.length === 0) { wrap.innerHTML = '<div class="empty">생성된 채팅방이 없습니다.</div>'; return; }

  const sorted = ids.sort((a, b) => (roomsCache[b].createdAt || 0) - (roomsCache[a].createdAt || 0));
  let html = `<table>
    <thead><tr>
      <th>코드</th><th>생성</th><th>만료</th><th>메시지</th><th>상태</th><th>관리</th>
    </tr></thead><tbody>`;
  
  sorted.forEach(id => {
    const r       = roomsCache[id];
    const msgs    = Object.keys(r.messages || {}).length;
    const isLive  = (r.expiresAt || 0) > now;
    const created = r.createdAt ? new Date(r.createdAt).toLocaleString('ko-KR') : '—';
    const expires = r.expiresAt ? new Date(r.expiresAt).toLocaleString('ko-KR') : '—';
    const statusBadge = isLive
      ? `<span class="badge active"><span class="badge-dot"></span>활성</span>`
      : `<span class="badge expired"><span class="badge-dot"></span>만료</span>`;
    const extBadge = r.extended ? `<span class="badge ext">연장됨</span>` : '';

    html += `<tr>
      <td><span class="room-code">${id}</span></td>
      <td style="font-size:13px;color:var(--text2);white-space:nowrap">${created}</td>
      <td style="font-size:13px;color:var(--text2);white-space:nowrap">${expires}</td>
      <td style="font-weight:600">${msgs}</td>
      <td>${statusBadge}${extBadge}</td>
      <td>
        <div class="acts">
          <button class="a-btn view"    onclick="viewRoom('${id}')">대화 보기</button>
          <button class="a-btn ext-btn" onclick="askExtend('${id}')">연장 +15분</button>
          <button class="a-btn del"     onclick="askDelete('${id}')">삭제</button>
        </div>
      </td>
    </tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function updateRefreshTime() {
  document.getElementById('last-refresh').textContent = '업데이트: ' + new Date().toLocaleTimeString('ko-KR');
}

// ── 5. 대화 보기 및 기타 기능 ──
function viewRoom(id) {
  const r = roomsCache[id];
  document.getElementById('detail-title').textContent = '대화 내용 — ' + id;
  const container = document.getElementById('detail-msgs');
  container.innerHTML = '';

  if (!r || !r.messages) {
    container.innerHTML = '<div class="panel-empty">메시지가 없습니다.</div>';
  } else {
    const msgs = Object.values(r.messages).sort((a, b) => a.ts - b.ts);
    const uidMap = {};
    let uidCount = 0;
    let lastDate = null;
    msgs.forEach(msg => {
      if (!(msg.uid in uidMap)) { uidMap[msg.uid] = uidCount === 0 ? 'in' : 'out'; uidCount++; }
      const dir = uidMap[msg.uid] || 'in';
      const d = fmtDate(
