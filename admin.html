<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 — 익명 메시지</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg:     #ffffff;
    --bg2:    #f5f5f7;
    --bg3:    #ebebeb;
    --text:   #1c1c1e;
    --text2:  #6e6e73;
    --blue:   #007aff;
    --border: #d1d1d6;
    --red:    #ff3b30;
    --green:  #34c759;
    --radius: 14px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }

  /* ── LOGIN ── */
  #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
  .login-box { width: 100%; max-width: 360px; padding: 40px 28px; display: flex; flex-direction: column; gap: 18px; align-items: center; }
  .login-box h1 { font-size: 22px; font-weight: 700; }
  .login-box p { font-size: 14px; color: var(--text2); text-align: center; }
  .login-box input { width: 100%; height: 50px; border-radius: 14px; border: 1.5px solid var(--border); padding: 0 16px; font-size: 16px; outline: none; }
  .login-box input:focus { border-color: var(--blue); }
  .login-box .l-btn { width: 100%; height: 50px; border-radius: 14px; border: none; background: var(--blue); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; }
  .login-box .l-btn:hover { opacity: .9; }
  .login-err { color: var(--red); font-size: 13px; display: none; }

  /* ── ADMIN UI ── */
  #admin-ui { display: none; flex-direction: column; min-height: 100vh; }
  header { background: var(--bg); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 20px; font-weight: 700; }
  header .h-right { display: flex; align-items: center; gap: 14px; }
  header .h-right span { font-size: 13px; color: var(--text2); }
  .logout-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; color: var(--text); }
  .logout-btn:hover { background: var(--bg2); }
  .main { max-width: 1000px; margin: 0 auto; padding: 24px 20px; }

  /* ── STATS ── */
  .stats-row { display: flex; gap: 14px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat { background: var(--bg); border-radius: var(--radius); padding: 14px 20px; flex: 1; min-width: 120px; border: 1px solid var(--border); }
  .stat .s-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .stat .s-val { font-size: 26px; font-weight: 700; }
  .stat.blue .s-val { color: var(--blue); }
  .stat.green .s-val { color: var(--green); }
  .stat.red .s-val { color: var(--red); }

  /* ── ROOMS TABLE ── */
  .section-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; font-size: 12px; }
  .rooms-wrap { background: var(--bg); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 12px; color: var(--text2); font-weight: 600; padding: 10px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
