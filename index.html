<!DOCTYPE html>
<html lang="ko">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>익명 메시지</title>

<!-- ══════════════════════════════════════════════ -->

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f7;
    --bg3: #ebebeb;
    --text: #1c1c1e;
    --text2: #6e6e73;
    --blue: #007aff;
    --blue-dark: #0062cc;
    --bubble-in: #e9e9eb;
    --bubble-out: #007aff;
    --border: #d1d1d6;
    --radius: 18px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── PAGES ── */
  .page { display: none; min-height: 100vh; }
  .page.active { display: flex; flex-direction: column; }

  /* ── HOME ── */
  #home { align-items: center; justify-content: center; background: var(--bg); }
  .home-inner { width: 100%; max-width: 400px; padding: 40px 24px; display: flex; flex-direction: column; align-items: center; gap: 28px; }
  .logo-area { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .logo-bubbles { display: flex; gap: 8px; }
  .lb { width: 20px; height: 20px; border-radius: 50%; }
  .lb.l { background: var(--bubble-in); }
  .lb.r { background: var(--bubble-out); }
  .logo-area h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .logo-area p { font-size: 14px; color: var(--text2); text-align: center; line-height: 1.6; }
  .btn { width: 100%; height: 50px; border-radius: 14px; border: none; cursor: pointer; font-size: 16px; font-weight: 600; transition: all .15s; }
  .btn.primary { background: var(--blue); color: #fff; }
  .btn.primary:hover { background: var(--blue-dark); }
  .btn.secondary { background: var(--bg3); color: var(--text); }
  .btn.secondary:hover { background: #d8d8da; }
  .divider { display: flex; align-items: center; gap: 12px; width: 100%; }
  .divider span { font-size: 13px; color: var(--text2); white-space: nowrap; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .join-row { display: flex; gap: 10px; width: 100%; }
  .join-row input { flex: 1; height: 50px; border-radius: 14px; border: 1.5px solid var(--border); padding: 0 16px; font-size: 16px; outline: none; letter-spacing: 3px; font-weight: 600; text-transform: uppercase; }
  .join-row input:focus { border-color: var(--blue); }
  .join-row input::placeholder { letter-spacing: 0; font-weight: 400; }
  .join-row .join-btn { height: 50px; padding: 0 22px; border-radius: 14px; border: none; background: var(--blue); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; white-space: nowrap; }

  /* ── CHAT HEADER ── */
  #chat { background: var(--bg); }
  .chat-header { background: rgba(255,255,255,.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
  .back-btn { background: none; border: none; color: var(--blue); font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 3px; padding: 4px 0; white-space: nowrap; }
  .back-btn svg { width: 9px; height: 15px; }
  .chat-title { flex: 1; text-align: center; }
  .chat-title .room-name { font-size: 15px; font-weight: 700; }
  .chat-title .room-code { font-size: 11px; color: var(--text2); margin-top: 1px; font-variant-numeric: tabular-nums; }
  .share-btn { background: none; border: none; color: var(--blue); font-size: 14px; cursor: pointer; white-space: nowrap; padding: 4px 0; }

  /* ── TIMER ── */
  .timer-bar { background: var(--bg2); padding: 7px 16px; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; border-bottom: 1px solid var(--border); }
  .t-dot { width: 7px; height: 7px; border-radius: 50%; background: #34c759; flex-shrink: 0; }
  .t-label { color: var(--text2); }
  .t-count { font-weight: 700; font-variant-numeric: tabular-nums; color: var(--text); min-width: 44px; display: inline-block; text-align: center; }
  .timer-bar.warn .t-dot { background: #ff3b30; animation: blink 1s infinite; }
  .timer-bar.warn .t-count { color: #ff3b30; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── EXPIRED BANNER ── */
  .expired-banner { background: #fff3cd; border-bottom: 1px solid #ffc107; padding: 8px 16px; text-align: center; font-size: 13px; color: #856404; }

  /* ── MESSAGES ── */
  .messages-wrap { flex: 1; overflow-y: auto; padding: 12px 0 4px; }
  .messages { display: flex; flex-direction: column; gap: 3px; max-width: 760px; margin: 0 auto; padding: 0 14px; }
  .date-sep { text-align: center; font-size: 11px; color: var(--text2); margin: 10px 0 4px; }

  /* bubbles */
  .msg-row { display: flex; flex-direction: column; max-width: 70%; }
  .msg-row.out { align-self: flex-end; align-items: flex-end; }
  .msg-row.in { align-self: flex-start; align-items: flex-start; }
  .bubble { padding: 10px 14px; border-radius: var(--radius); font-size: 16px; line-height: 1.45; word-break: break-word; max-width: 100%; display: inline-block; }
  .msg-row.out .bubble { background: var(--bubble-out); color: #fff; border-bottom-right-radius: 5px; }
  .msg-row.in .bubble { background: var(--bubble-in); color: var(--text); border-bottom-left-radius: 5px; }
  .bubble-time { font-size: 11px; color: var(--text2); margin-top: 3px; }

  /* ── INPUT ── */
  .input-area { border-top: 1px solid var(--border); padding: 10px 12px 14px; background: var(--bg); }
  .input-inner { display: flex; align-items: flex-end; gap: 8px; max-width: 760px; margin: 0 auto; }
  .input-inner textarea { flex: 1; min-height: 44px; max-height: 120px; border: 1.5px solid var(--border); border-radius: 22px; padding: 11px 16px; font-size: 16px; line-height: 1.4; resize: none; outline: none; font-family: inherit; background: var(--bg2); transition: border-color .15s; }
  .input-inner textarea:focus { border-color: var(--blue); background: var(--bg); }
  .input-inner textarea:disabled { opacity: .5; cursor: not-allowed; }
  .send-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--blue); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-bottom: 3px; transition: background .15s, transform .1s; }
  .send-btn:disabled { background: var(--border); cursor: default; }
  .send-btn:not(:disabled):active { transform: scale(.93); }
  .send-btn svg { width: 16px; height: 16px; fill: #fff; }

  /* ── MODAL ── */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.42); display: none; align-items: center; justify-content: center; z-index: 100; }
  .overlay.open { display: flex; }
  .modal { background: var(--bg); border-radius: 18px; padding: 28px 24px; width: 90%; max-width: 360px; }
  .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .modal p { font-size: 14px; color: var(--text2); line-height: 1.55; margin-bottom: 20px; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button { flex: 1; height: 46px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; }
  .m-cancel { background: var(--bg3); color: var(--text); }
  .m-ok { background: var(--blue); color: #fff; }

  /* share modal specifics */
  .code-box { background: var(--bg2); border-radius: 14px; padding: 18px; text-align: center; margin-bottom: 14px; }
  .code-big { font-size: 34px; font-weight: 800; letter-spacing: 7px; color: var(--text); font-variant-numeric: tabular-nums; }
  .code-hint { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .share-url-box { background: var(--bg2); border-radius: 10px; padding: 10px 14px; font-size: 13px; color: var(--text2); word-break: break-all; margin-bottom: 16px; line-height: 1.5; }

  /* ── TOAST ── */
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(16px); background: rgba(28,28,30,.9); color: #fff; font-size: 14px; padding: 10px 22px; border-radius: 22px; z-index: 200; opacity: 0; transition: all .25s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── LOADING ── */
  .loading { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 40px; color: var(--text2); font-size: 14px; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    .bubble { font-size: 15px; }
    .msg-row { max-width: 80%; }
  }
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MODAL: share -->
<div class="overlay" id="m-share">
  <div class="modal">
    <h3>채팅방 공유</h3>
    <div class="code-box">
      <div class="code-big" id="s-code"></div>
      <div class="code-hint">입장 코드</div>
    </div>
    <div class="share-url-box" id="s-url"></div>
    <div class="modal-btns">
      <button class="m-cancel" onclick="closeModal('m-share')">닫기</button>
      <button class="m-ok" onclick="copyLink()">링크 복사</button>
    </div>
  </div>
</div>

<!-- PAGE: HOME -->
<div class="page active" id="home">
  <div class="home-inner">
    <div class="logo-area">
      <div class="logo-bubbles">
        <div class="lb l"></div><div class="lb r"></div>
        <div class="lb l"></div><div class="lb r"></div>
      </div>
      <h1>익명 메시지</h1>
      <p>회원가입 없이 익명으로 대화<br>15분 타이머 · 실시간 동기화</p>
    </div>
    <button class="btn primary" onclick="createRoom()">새 채팅방 만들기</button>
    <div class="divider"><span>또는 코드로 입장</span></div>
    <div class="join-row">
      <input id="code-input" placeholder="입장 코드 6자리" maxlength="6"
        oninput="this.value=this.value.replace(/[^A-Za-z0-9]/g,'').toUpperCase()"
        onkeydown="if(event.key==='Enter')joinRoom()" />
      <button class="join-btn" onclick="joinRoom()">입장</button>
    </div>
  </div>
</div>

<!-- PAGE: CHAT -->
<div class="page" id="chat">
  <div class="chat-header">
    <button class="back-btn" onclick="leaveRoom()">
      <svg viewBox="0 0 9 15" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M7.5 1L1.5 7.5L7.5 14" stroke="#007aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      홈
    </button>
    <div class="chat-title">
      <div class="room-name">익명 채팅</div>
      <div class="room-code" id="hdr-code"></div>
    </div>
    <button class="share-btn" onclick="openShare()">공유</button>
  </div>

  <div class="timer-bar" id="timer-bar">
    <div class="t-dot"></div>
    <span class="t-label">남은 시간</span>
    <span class="t-count" id="t-display">15:00</span>
  </div>

  <div id="exp-banner" style="display:none" class="expired-banner">
    ⏰ 타이머가 만료되었습니다. 대화 내용은 계속 보관됩니다.
  </div>

  <div class="messages-wrap" id="msg-wrap">
    <div class="messages" id="msg-list">
      <div class="loading"><div class="spinner"></div>불러오는 중...</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-inner">
      <textarea id="txt" placeholder="메시지 입력..." rows="1"
        onkeydown="onKey(event)" oninput="resize(this);toggleBtn()"></textarea>
      <button class="send-btn" id="send-btn" onclick="send()" disabled>
        <svg viewBox="0 0 16 16"><path d="M2 14L14 8L2 2V6.5L10 8L2 9.5V14Z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
// ── CONSTANTS ──
const TIMER_MS  = 15 * 60 * 1000;
const CODE_CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';

// ── STATE ──
let roomId   = null;   // current room code
let myUid    = null;   // anonymous session uid
let timerTick = null;
let msgListener = null;
let roomListener = null;

// ── SESSION UID (anonymous, per browser session) ──
function getUid() {
  let uid = sessionStorage.getItem('anonUid');
  if (!uid) {
    uid = Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);
    sessionStorage.setItem('anonUid', uid);
  }
  return uid;
}

// ── UTILS ──
function randCode() {
  return Array.from({length: 6}, () => CODE_CHARS[Math.floor(Math.random() * CODE_CHARS.length)]).join('');
}
function fmtTime(ts) {
  const d = new Date(ts);
  const h = d.getHours(), m = d.getMinutes();
  return (h < 12 ? '오전 ' : '오후 ') + (h % 12 || 12) + ':' + String(m).padStart(2,'0');
}
function fmtDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── CREATE ROOM ──
async function createRoom() {
  const code = randCode();
  const now  = Date.now();
  await db.ref('rooms/' + code).set({
    createdAt: now,
    expiresAt: now + TIMER_MS,
    extended:  false
  });
  enterRoom(code);
}

// ── JOIN ROOM ──
async function joinRoom() {
  const code = document.getElementById('code-input').value.trim().toUpperCase();
  if (code.length < 4) { toast('코드를 입력해 주세요.'); return; }
  const snap = await db.ref('rooms/' + code).once('value');
  if (!snap.exists()) { toast('존재하지 않는 채팅방입니다.'); return; }
  enterRoom(code);
}

// ── ENTER ROOM ──
function enterRoom(code) {
  roomId = code;
  myUid  = getUid();

  document.getElementById('hdr-code').textContent = '코드: ' + code;
  document.getElementById('code-input').value = '';
  document.getElementById('exp-banner').style.display = 'none';
  document.getElementById('timer-bar').classList.remove('warn');
  document.getElementById('txt').disabled = false;
  document.getElementById('txt').value = '';
  document.getElementById('txt').style.height = '';
  document.getElementById('send-btn').disabled = true;

  showPage('chat');
  listenRoom();
  listenMessages();
}

// ── LEAVE ROOM ──
function leaveRoom() {
  if (msgListener)  { db.ref('rooms/' + roomId + '/messages').off('value', msgListener); msgListener = null; }
  if (roomListener) { db.ref('rooms/' + roomId).off('value', roomListener); roomListener = null; }
  clearInterval(timerTick);
  roomId = null;
  showPage('home');
}

// ── LISTEN ROOM (timer) ──
function listenRoom() {
  clearInterval(timerTick);
  if (roomListener) { db.ref('rooms/' + roomId).off('value', roomListener); }

  roomListener = db.ref('rooms/' + roomId).on('value', snap => {
    if (!snap.exists()) return;
    const data = snap.val();
    startTimerDisplay(data.expiresAt);
  });
}

// ── TIMER DISPLAY ──
function startTimerDisplay(expiresAt) {
  clearInterval(timerTick);
  tick(expiresAt);
  timerTick = setInterval(() => tick(expiresAt), 1000);
}
function tick(expiresAt) {
  const left = expiresAt - Date.now();
  const bar  = document.getElementById('timer-bar');
  const disp = document.getElementById('t-display');
  const txt  = document.getElementById('txt');
  const exp  = document.getElementById('exp-banner');

  if (left <= 0) {
    disp.textContent = '00:00';
    bar.classList.add('warn');
    clearInterval(timerTick);
    exp.style.display = '';
    txt.disabled = true;
    txt.placeholder = '타이머가 만료되었습니다.';
    return;
  }
  const m = Math.floor(left / 60000);
  const s = Math.floor((left % 60000) / 1000);
  disp.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  if (left < 3 * 60 * 1000) bar.classList.add('warn'); else bar.classList.remove('warn');
  txt.disabled = false;
  txt.placeholder = '메시지 입력...';
  exp.style.display = 'none';
}

// ── LISTEN MESSAGES ──
function listenMessages() {
  if (msgListener) { db.ref('rooms/' + roomId + '/messages').off('value', msgListener); }

  msgListener = db.ref('rooms/' + roomId + '/messages').on('value', snap => {
    const list = document.getElementById('msg-list');
    list.innerHTML = '';
    if (!snap.exists()) return;
    const msgs = [];
    snap.forEach(child => { msgs.push({ key: child.key, ...child.val() }); });
    msgs.sort((a,b) => a.ts - b.ts);

    let lastDate = null;
    msgs.forEach(msg => {
      const d = fmtDate(msg.ts);
      if (d !== lastDate) {
        const sep = document.createElement('div');
        sep.className = 'date-sep';
        sep.textContent = d;
        list.appendChild(sep);
        lastDate = d;
      }
      const isOut = msg.uid === myUid;
      const row = document.createElement('div');
      row.className = 'msg-row ' + (isOut ? 'out' : 'in');

      const bub = document.createElement('div');
      bub.className = 'bubble';
      bub.textContent = msg.text;
      row.appendChild(bub);

      const bt = document.createElement('div');
      bt.className = 'bubble-time';
      bt.textContent = fmtTime(msg.ts);
      row.appendChild(bt);

      list.appendChild(row);
    });

    const wrap = document.getElementById('msg-wrap');
    wrap.scrollTop = wrap.scrollHeight;
  });
}

// ── SEND MESSAGE ──
async function send() {
  const txt = document.getElementById('txt');
  const text = txt.value.trim();
  if (!text || !roomId) return;

  const snap = await db.ref('rooms/' + roomId + '/expiresAt').once('value');
  if (!snap.exists() || Date.now() > snap.val()) {
    toast('타이머가 만료되어 전송할 수 없습니다.');
    return;
  }

  await db.ref('rooms/' + roomId + '/messages').push({
    uid:  myUid,  // uid만 저장, 닉네임 없음
    text: text,
    ts:   Date.now()
  });

  txt.value = '';
  txt.style.height = '';
  document.getElementById('send-btn').disabled = true;
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}
function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function toggleBtn() {
  document.getElementById('send-btn').disabled = !document.getElementById('txt').value.trim();
}

// ── SHARE ──
function openShare() {
  document.getElementById('s-code').textContent = roomId;
  document.getElementById('s-url').textContent  = location.origin + location.pathname + '?room=' + roomId;
  openModal('m-share');
}
function copyLink() {
  const url = location.origin + location.pathname + '?room=' + roomId;
  navigator.clipboard.writeText(url)
    .then(() => toast('링크가 복사되었습니다!'))
    .catch(() => toast('링크: ' + url));
  closeModal('m-share');
}

// ── URL PARAM AUTO-JOIN ──
(function() {
  const p = new URLSearchParams(location.search).get('room');
  if (p) joinRoomByCode(p.toUpperCase().slice(0, 6));
})();
async function joinRoomByCode(code) {
  const snap = await db.ref('rooms/' + code).once('value');
  if (snap.exists()) enterRoom(code);
  else toast('존재하지 않는 채팅방입니다.');
}
</script>
</body>
</html>
